services:

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - auth-service
      - plaid-service
      - investment-service
      - subscription-service
      - notification-service
      - user-service

  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres

  plaid-service:
    build: ./services/plaid-service
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  investment-service:
    build: ./services/investment-service
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  subscription-service:
    build: ./services/subscription-service
    ports:
      - "3004:3004"
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres

  notification-service:
    build: ./services/notification-service
    ports:
      - "3005:3005"
    env_file: .env

  user-service:
    build: ./services/user-service
    ports:
      - "3006:3006"
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unispend}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
